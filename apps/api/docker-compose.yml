version: '3.8'

services:
  api:
    build: .
    container_name: ${APP_NAME:-go-framework}-api
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: ${APP_NAME:-go-framework}-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-mydb}
      POSTGRES_USER: ${DB_USERNAME:-dbuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-dbuser} -d ${DB_DATABASE:-mydb}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
