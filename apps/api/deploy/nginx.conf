# =============================================================================
# Go Framework — Nginx Reverse Proxy Config
# =============================================================================
# Copy ke: /etc/nginx/sites-available/myapp
# Link:    ln -s /etc/nginx/sites-available/myapp /etc/nginx/sites-enabled/
# Test:    nginx -t
# Reload:  systemctl reload nginx
# SSL:     certbot --nginx -d api.yourdomain.com
# =============================================================================

server {
    listen 80;
    server_name api.yourdomain.com;  # GANTI dengan domain kamu

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Max upload size
    client_max_body_size 10M;

    # Backend API
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:3001;
        access_log off;
    }

    # SSL akan ditambahkan otomatis oleh Certbot
}
